<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none">
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>
  <!-- Outer hexagonal network frame -->
  <polygon points="16,2.5 29.5,10.3 29.5,25.7 16,29.5 2.5,25.7 2.5,10.3" stroke="url(#glow-grad)" stroke-width="2" stroke-linejoin="round" opacity="0.8"/>
  
  <!-- Outer nodes representing API connectivity -->
  <circle cx="16" cy="2.5" r="2" fill="#00f2fe" />
  <circle cx="29.5" cy="10.3" r="2" fill="#3b82f6" />
  <circle cx="29.5" cy="25.7" r="2" fill="#8b5cf6" />
  <circle cx="16" cy="29.5" r="2" fill="#8b5cf6" />
  <circle cx="2.5" cy="25.7" r="2" fill="#8b5cf6" />
  <circle cx="2.5" cy="10.3" r="2" fill="#3b82f6" />
  
  <!-- Stylized Lightning Bolt representing Relay & Speed -->
  <path d="M18 5.5 L9 16.5 H15 L14 25.5 L23 14.5 H17 L18 5.5 Z" fill="url(#logo-grad)"/>
</svg>
