<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <defs>
    <linearGradient id="bolt-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="hex-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="text-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Logo icon (scaled to fit) -->
  <g transform="translate(40, 20) scale(0.32)">
    <!-- Hexagon -->
    <polygon 
      points="256,40 456,156 456,356 256,472 56,356 56,156" 
      stroke="url(#hex-grad)" 
      stroke-width="16" 
      stroke-linejoin="round" 
      fill="none"
      opacity="0.9"
    />
    <!-- Node dots -->
    <circle cx="256" cy="40" r="18" fill="#00f2fe" filter="url(#glow)"/>
    <circle cx="456" cy="156" r="18" fill="#3b82f6" filter="url(#glow)"/>
    <circle cx="456" cy="356" r="18" fill="#8b5cf6" filter="url(#glow)"/>
    <circle cx="256" cy="472" r="18" fill="#8b5cf6" filter="url(#glow)"/>
    <circle cx="56" cy="356" r="18" fill="#8b5cf6" filter="url(#glow)"/>
    <circle cx="56" cy="156" r="18" fill="#3b82f6" filter="url(#glow)"/>
    <!-- Lightning bolt -->
    <path 
      d="M290 80 L160 264 H240 L224 432 L352 248 H272 L290 80 Z" 
      fill="url(#bolt-grad)" 
      filter="url(#glow)"
    />
    <path 
      d="M280 110 L180 256 H244 L232 396 L332 256 H270 L280 110 Z" 
      fill="white" 
      opacity="0.15"
    />
  </g>
  
  <!-- Text: AI Relay -->
  <text x="220" y="118" font-family="'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="80" font-weight="700" fill="url(#text-grad)" filter="url(#text-glow)">
    AI Relay
  </text>
  
  <!-- Subtle tagline -->
  <text x="222" y="152" font-family="'Inter', 'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="#94a3b8" letter-spacing="3">
    LIGHTWEIGHT AI API RELAY
  </text>
</svg>
